{% extends 'base.html' %}

{% block title %}TaskFlow — Organize your day{% endblock %}

{% block content %}
<section class="hero">
    <h1>Get your tasks under control.</h1>
    <p>TaskFlow helps you organize your day into simple, focused to-do lists.</p>
    <div class="hero-actions">
        <a {% if user.is_authenticated %} href="{% url 'tasks:tasks_list' %}" {% else %} href="{% url 'accounts:register' %}" {% endif %} class="btn btn-primary">Get started</a>
        {% if not user.is_authenticated %} <a href="{% url 'accounts:login' %}" class="btn btn-outline">Login</a> {% endif %}
    </div>
</section>
{% endblock %}
